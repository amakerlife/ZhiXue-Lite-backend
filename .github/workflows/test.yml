name: Run Tests

on:
  push:
    branches:
      - main
      - dev
      - '**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    name: Python Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: zhixue_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zhixue_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Set up environment variables
        run: |
          echo "DATABASE_URL=postgresql://zhixue_test:test_password@localhost:5432/zhixue_test" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-for-ci" >> $GITHUB_ENV
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "TURNSTILE_ENABLED=false" >> $GITHUB_ENV
          echo "CAPTCHA_URL=http://fake-captcha.test" >> $GITHUB_ENV
          echo "FONT_PATH=/fake/font/path" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          # 初始化数据库迁移（如果需要）
          if [ ! -d "migrations" ]; then
            flask db init || true
          fi
          # 运行迁移
          flask db upgrade || echo "No migrations to run"
        continue-on-error: true  # 如果没有迁移文件，继续执行

      - name: Run tests with coverage
        run: |
          pytest -v --cov=src/ZhiXueLite --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true  # Codecov 失败不阻止 CI

      - name: Generate coverage summary
        if: always()
        run: |
          if [ -f "coverage.xml" ]; then
            echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            pytest --cov=src/ZhiXueLite --cov-report=term | tail -n 20 >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7
