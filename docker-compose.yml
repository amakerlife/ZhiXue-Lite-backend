version: '3.8'

services:
  db:
    image: postgres:17
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 1m
    env_file:
      - .env
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhixuelite -d zhixuelite"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        flask db upgrade &&
        gunicorn --config gunicorn.conf.py src.ZhiXueLite.main:app
      "

  # Task worker service
  task-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    command: python src/ZhiXueLite/task_worker/start.py