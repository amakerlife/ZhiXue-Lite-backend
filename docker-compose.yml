version: '3.8'

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhixuelite
      POSTGRES_USER: zhixuelite
      POSTGRES_PASSWORD: zhixuelite_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhixuelite -d zhixuelite"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PROD_SECRET_KEY=your-production-secret-key-change-this
      - PROD_DATABASE_URL=postgresql://zhixuelite:zhixuelite_password@db:5432/zhixuelite
      - CAPTCHA_URL=your-captcha-url
      - LOG_LEVEL=INFO
      - FRONTEND_URLS=http://localhost:3000,http://localhost:5173
      - FONT_PATH=/app/assets/msyh.ttc
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        sleep 10 &&
        flask db upgrade &&
        gunicorn --config gunicorn.conf.py src.ZhiXueLite.main:app
      "

  # Task worker service (可选)
  task-worker:
    build: .
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - PROD_SECRET_KEY=your-production-secret-key-change-this
      - PROD_DATABASE_URL=postgresql://zhixuelite:zhixuelite_password@db:5432/zhixuelite
      - LOG_LEVEL=INFO
      - FONT_PATH=/app/assets/msyh.ttc
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    command: python src/ZhiXueLite/task_worker/start.py

volumes:
  postgres_data: